<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RayTrace ’95 — Zufällige 90er-Raytracing-Bilder</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #008080;
    font-family: Tahoma, Verdana, "DejaVu Sans", sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 12px;
  }
  .window {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #404040 #404040 #ffffff;
    box-shadow: 4px 4px 0 rgba(0,0,0,.35);
    max-width: 100%;
  }
  .titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    font-weight: bold;
    padding: 3px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .titlebar .tname { overflow: hidden; text-overflow: ellipsis; }
  .tbtns { margin-left: auto; display: flex; gap: 2px; }
  .tbtns span {
    width: 18px; height: 16px;
    background: #c0c0c0; color: #000;
    border: 1px solid; border-color: #fff #404040 #404040 #fff;
    font-size: 11px; line-height: 14px; text-align: center;
    font-family: monospace;
  }
  .toolbar {
    padding: 5px 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid #808080;
  }
  .toolbar .lbl { color: #333; }
  button {
    font-family: inherit; font-size: 13px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #404040 #404040 #ffffff;
    padding: 3px 10px;
    cursor: pointer;
  }
  button:active { border-color: #404040 #ffffff #ffffff #404040; }
  button:disabled { color: #808080; cursor: default; }
  input[type=text], select {
    font-family: inherit; font-size: 13px;
    background: #fff;
    border: 2px solid;
    border-color: #404040 #ffffff #ffffff #404040;
    padding: 2px 4px;
  }
  #seedInput { width: 250px; font-size: 12px; }
  label.cb { display: inline-flex; align-items: center; gap: 4px; user-select: none; }
  .sep { width: 1px; height: 20px; background: #808080; border-right: 1px solid #fff; }
  .canvasWrap {
    padding: 8px;
    background: #c0c0c0;
    display: flex;
    justify-content: center;
  }
  .canvasInner {
    border: 2px solid;
    border-color: #404040 #ffffff #ffffff #404040;
    background: #000;
    line-height: 0;
    max-width: 100%;
    overflow: auto;
  }
  canvas { display: block; max-width: 100%; height: auto; }
  canvas.px2 { image-rendering: pixelated; }
  .gallery {
    padding: 4px 8px 8px 8px;
    border-top: 1px solid #808080;
  }
  .gallery h4 { margin: 4px 0 3px 0; font-size: 11px; font-weight: bold; color: #333; }
  button.mini { padding: 0 6px; font-size: 11px; margin-left: 6px; }
  .strip {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    min-height: 20px;
    padding: 3px;
    background: #a8a8a8;
    border: 2px solid;
    border-color: #404040 #ffffff #ffffff #404040;
  }
  .strip:empty::after { content: "– leer –"; color: #666; font-size: 11px; padding: 2px 4px; }
  .thumb {
    position: relative;
    flex: 0 0 auto;
    cursor: pointer;
    border: 1px solid #404040;
    line-height: 0;
  }
  .thumb img { display: block; }
  .thumb:hover { outline: 2px solid #000080; }
  .thumb .del {
    position: absolute; top: 0; right: 0;
    width: 14px; height: 14px;
    background: #c0c0c0; color: #000;
    font-size: 10px; line-height: 13px; text-align: center;
    border: 1px solid #404040;
    display: none;
  }
  .thumb:hover .del { display: block; }
  .statusbar {
    display: flex;
    gap: 6px;
    padding: 3px 6px 5px 6px;
  }
  .statusbar > span {
    border: 1px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    padding: 2px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #status { flex: 1; min-width: 120px; }
</style>

<script id="coreScript">
//__CORE_START__
'use strict';
var EPS = 1e-4;
var MAX_DEPTH = 6;
var STATS = { rays: 0 };

// ---------------------------------------------------------------- RNG
function xmur3(str) {
  var h = 1779033703 ^ str.length;
  for (var i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function makeRng(seed) {
  var f = mulberry32(seed >>> 0);
  return {
    next: f,
    range: function (a, b) { return a + (b - a) * f(); },
    int: function (a, b) { return a + Math.floor(f() * (b - a + 1)); },
    pick: function (arr) { return arr[Math.floor(f() * arr.length)]; },
    chance: function (p) { return f() < p; }
  };
}
function wpick(R, pairs) {
  var total = 0, i;
  for (i = 0; i < pairs.length; i++) total += pairs[i][1];
  var x = R.next() * total;
  for (i = 0; i < pairs.length; i++) {
    x -= pairs[i][1];
    if (x <= 0) return pairs[i][0];
  }
  return pairs[pairs.length - 1][0];
}

// Seed-Verwaltung: 4 Teilströme (Layout, Palette, Himmel, Kamera)
function deriveSeeds(master) {
  var f = mulberry32(master >>> 0);
  return [Math.floor(f() * 4294967296), Math.floor(f() * 4294967296),
          Math.floor(f() * 4294967296), Math.floor(f() * 4294967296)];
}
function parseSeedInput(str) {
  str = String(str).trim();
  var m = str.match(/^(\d{1,10})\.(\d{1,10})\.(\d{1,10})\.(\d{1,10})$/);
  if (m) return { seeds: [+m[1] >>> 0, +m[2] >>> 0, +m[3] >>> 0, +m[4] >>> 0], display: str };
  var master;
  if (/^\d{1,10}$/.test(str) && +str <= 4294967295) master = +str >>> 0;
  else master = xmur3(str || '0');
  return { seeds: deriveSeeds(master), display: str || '0' };
}
function seedsToStr(seeds) { return seeds.join('.'); }

// ---------------------------------------------------------------- Farben
function hsl(h, s, l) {
  h = ((h % 1) + 1) % 1;
  var a = s * Math.min(l, 1 - l);
  function f(n) {
    var k = (n + h * 12) % 12;
    return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
  }
  return [f(0), f(8), f(4)];
}
function mix3(a, b, t) {
  return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
}
function scale3(a, s) { return [a[0] * s, a[1] * s, a[2] * s]; }
function smoothstep(a, b, x) {
  var t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

// ---------------------------------------------------------------- Noise
function hash2i(i, j) {
  var n = (Math.imul(i, 374761393) + Math.imul(j, 668265263)) | 0;
  n = Math.imul(n ^ (n >>> 13), 1274126177);
  n ^= n >>> 16;
  return (n >>> 0) / 4294967296;
}
function hash3i(i, j, k) {
  var n = (Math.imul(i, 374761393) + Math.imul(j, 668265263) + Math.imul(k, 2246822519)) | 0;
  n = Math.imul(n ^ (n >>> 13), 1274126177);
  n ^= n >>> 16;
  return (n >>> 0) / 4294967296;
}
function noise2(x, y) {
  var ix = Math.floor(x), iy = Math.floor(y);
  var fx = x - ix, fy = y - iy;
  var ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  var a = hash2i(ix, iy), b = hash2i(ix + 1, iy);
  var c = hash2i(ix, iy + 1), d = hash2i(ix + 1, iy + 1);
  return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
}
function fbm2(x, y, oct) {
  var v = 0, amp = 0.5, f = 1;
  for (var i = 0; i < oct; i++) { v += amp * noise2(x * f, y * f); f *= 2.03; amp *= 0.5; }
  return v;
}

// ---------------------------------------------------------------- Polynom-Löser (Graphics Gems)
function solveCubic(A, B, C, out) { // x³ + Ax² + Bx + C = 0
  var sqA = A * A;
  var p = B / 3 - sqA / 9;
  var q = sqA * A / 27 - A * B / 6 + C / 2;
  var D = q * q + p * p * p;
  var n = 0, i;
  if (D > -1e-13 && D < 1e-13) {
    if (q > -1e-13 && q < 1e-13) { out[0] = 0; n = 1; }
    else { var u0 = Math.cbrt(-q); out[0] = 2 * u0; out[1] = -u0; n = 2; }
  } else if (D < 0) {
    var phi = Math.acos(Math.max(-1, Math.min(1, -q / Math.sqrt(-p * p * p)))) / 3;
    var t = 2 * Math.sqrt(-p);
    out[0] = t * Math.cos(phi);
    out[1] = -t * Math.cos(phi + Math.PI / 3);
    out[2] = -t * Math.cos(phi - Math.PI / 3);
    n = 3;
  } else {
    var sqD = Math.sqrt(D);
    out[0] = Math.cbrt(sqD - q) - Math.cbrt(sqD + q);
    n = 1;
  }
  var sub = A / 3;
  for (i = 0; i < n; i++) out[i] -= sub;
  return n;
}
var QUAD_TMP = [0, 0, 0];
function solveQuartic(A, B, C, D, out) { // x⁴ + Ax³ + Bx² + Cx + D = 0
  var sqA = A * A;
  var p = -0.375 * sqA + B;
  var q = 0.125 * sqA * A - 0.5 * A * B + C;
  var r = -0.01171875 * sqA * sqA + 0.0625 * sqA * B - 0.25 * A * C + D;
  var n = 0, i;
  if (r > -1e-13 && r < 1e-13) {
    n = solveCubic(0, p, q, out);
    out[n++] = 0;
  } else {
    var nc = solveCubic(-0.5 * p, -r, 0.5 * r * p - 0.125 * q * q, QUAD_TMP);
    var z = QUAD_TMP[0];
    for (i = 1; i < nc; i++) if (QUAD_TMP[i] > z) z = QUAD_TMP[i];
    var u = z * z - r, v = 2 * z - p;
    if (u < 0) { if (u > -1e-9) u = 0; else return 0; }
    if (v < 0) { if (v > -1e-9) v = 0; else return 0; }
    u = Math.sqrt(u); v = Math.sqrt(v);
    var vq = q < 0 ? -v : v;
    var disc1 = vq * vq - 4 * (z - u);
    if (disc1 >= 0) {
      var s1 = Math.sqrt(disc1);
      out[n++] = (-vq - s1) / 2;
      out[n++] = (-vq + s1) / 2;
    }
    var disc2 = vq * vq - 4 * (z + u);
    if (disc2 >= 0) {
      var s2 = Math.sqrt(disc2);
      out[n++] = (vq - s2) / 2;
      out[n++] = (vq + s2) / 2;
    }
  }
  var sub = A / 4;
  for (i = 0; i < n; i++) out[i] -= sub;
  return n;
}

// ---------------------------------------------------------------- Texturen
function texAt(tex, x, z, y, dist) {
  var c, s, k, v, n, g;
  switch (tex.type) {
    case 'solid': c = tex.c1; break;
    case 'checker':
      s = tex.scale;
      k = Math.floor(x / s) + Math.floor(z / s);
      if (tex.d3) k += Math.floor(y / s);
      c = (k & 1) ? tex.c2 : tex.c1;
      break;
    case 'stripes':
      s = tex.scale;
      k = Math.floor((x * tex.ax + z * tex.az) / s);
      c = (((k % 2) + 2) % 2) ? tex.c2 : tex.c1;
      break;
    case 'marble':
      n = fbm2(x * 0.5 + tex.off, z * 0.5 - tex.off, 4);
      v = 0.5 + 0.5 * Math.sin((x * tex.ax + z * tex.az) * tex.freq + n * tex.turb);
      v = Math.pow(v, 1.6);
      c = mix3(tex.c1, tex.c2, v);
      break;
    case 'wood':
      g = x * tex.ax + z * tex.az + fbm2(x * 0.6 + tex.off, z * 0.6, 3) * tex.turb;
      v = 0.5 + 0.5 * Math.sin(g * tex.freq);
      v = v * v * v;
      c = mix3(tex.c1, tex.c2, v);
      break;
    case 'bozo':
      v = fbm2(x * tex.freq + tex.off, z * tex.freq - tex.off, 4);
      c = v < tex.t1 ? tex.c1 : v < tex.t2 ? tex.c2 : tex.c3;
      break;
    case 'grid':
      s = tex.scale;
      var fx = Math.abs((((x / s) % 1) + 1) % 1 - 0.5);
      var fz = Math.abs((((z / s) % 1) + 1) % 1 - 0.5);
      c = (fx > 0.5 - tex.lw || fz > 0.5 - tex.lw) ? tex.c2 : tex.c1;
      break;
    default: c = tex.c1;
  }
  if (tex.fade && dist > 0) { // Muster in der Ferne ausblenden (gegen Moiré)
    var f = Math.min(dist / (dist + tex.fade), 0.9);
    if (f > 0.02) c = mix3(c, tex.avg, f);
  }
  return c;
}
function texAvg(c1, c2) { return mix3(c1, c2, 0.5); }

// ---------------------------------------------------------------- Himmel
function skyColor(sky, dx, dy, dz) {
  var t = dy > 0 ? Math.pow(Math.min(dy, 1), 0.45) : 0;
  var col, i;
  if (sky.type === 'bands') {
    var tq = Math.floor(t * sky.bandN) / Math.max(1, sky.bandN - 1);
    col = mix3(sky.hor, sky.zen, Math.min(1, tq));
  } else {
    col = mix3(sky.hor, sky.zen, t);
  }
  if (dy < 0) col = scale3(col, Math.max(0.25, 1 + dy * 1.1));

  if (sky.stars && dy > 0.03) {
    var N = 220;
    var h = hash3i(Math.floor(dx * N), Math.floor(dy * N), Math.floor(dz * N));
    if (h > 0.9985) {
      var b = (h - 0.9985) / 0.0015;
      b = b * b * 1.4 * smoothstep(0.05, 0.3, dy);
      col = [col[0] + b, col[1] + b, col[2] + b * 1.05];
    }
    col = [col[0] + sky.hor[0] * Math.pow(Math.max(0, 1 - dy), 10) * 0.35,
           col[1] + sky.hor[1] * Math.pow(Math.max(0, 1 - dy), 10) * 0.35,
           col[2] + sky.hor[2] * Math.pow(Math.max(0, 1 - dy), 10) * 0.35];
  }

  if (sky.planets) {
    for (i = 0; i < sky.planets.length; i++) {
      var P = sky.planets[i];
      var pd = dx * P.x + dy * P.y + dz * P.z;
      if (pd < P.cosCull) continue;
      var lx = (dx * P.ux + dy * P.uy + dz * P.uz) / P.sinR;
      var ly = (dx * P.vx + dy * P.vy + dz * P.vz) / P.sinR;
      var rho = Math.sqrt(lx * lx + ly * ly);
      if (P.ring && rho >= 0.97) {
        var e = Math.sqrt(lx * lx + (ly / P.ring.tilt) * (ly / P.ring.tilt));
        if (e > P.ring.r1 && e < P.ring.r2) {
          var ra = smoothstep(P.ring.r1, P.ring.r1 + 0.12, e) * smoothstep(P.ring.r2, P.ring.r2 - 0.15, e) * 0.75;
          col = mix3(col, P.ring.col, ra);
        }
      }
      if (rho < 1) {
        var pz2 = Math.sqrt(Math.max(0, 1 - rho * rho));
        var nx2 = P.ux * lx + P.vx * ly - P.x * pz2;
        var ny2 = P.uy * lx + P.vy * ly - P.y * pz2;
        var nz2 = P.uz * lx + P.vz * ly - P.z * pz2;
        var diff = Math.max(0, nx2 * P.lx + ny2 * P.ly + nz2 * P.lz);
        var base;
        if (P.bands) {
          var bv = 0.5 + 0.5 * Math.sin(ly * P.bandF + fbm2(lx * 2 + P.off, ly * 2) * 2.2);
          base = mix3(P.c1, P.c2, bv);
        } else {
          base = mix3(P.c1, P.c2, smoothstep(0.35, 0.62, fbm2(lx * 2.5 + P.off, ly * 2.5, 3)));
        }
        var pc = scale3(base, 0.12 + 0.88 * diff);
        col = mix3(col, pc, smoothstep(1.0, 0.965, rho));
      }
    }
  }

  if (sky.sun) {
    var d = dx * sky.sun.x + dy * sky.sun.y + dz * sky.sun.z;
    if (d > 0) {

  var sx = px + nx * 2e-4, sy = py + ny * 2e-4, sz = pz + nz * 2e-4;
  for (var li = 0; li < lights.length; li++) {
    var L = lights[li];
    var att = lightAtten(scene, sx, sy, sz, L);
    if (!att) continue;
    var llx = att[3], lly = att[4], llz = att[5];
    var ndl = nx * llx + ny * lly + nz * llz;
    if (ndl > 0) {
      var dK = ndl * mat.diffuse * L.intensity;
      cr += base[0] * L.col[0] * dK * att[0];
      cg += base[1] * L.col[1] * dK * att[1];
      cb += base[2] * L.col[2] * dK * att[2];
    }
    if (mat.specular > 0) {
      var rdx = dx - 2 * nd * nx, rdy = dy - 2 * nd * ny, rdz = dz - 2 * nd * nz;
      var rdl = rdx * llx + rdy * lly + rdz * llz;
      if (rdl > 0) {
        var sK = Math.pow(rdl, mat.shine) * mat.specular * L.intensity;
        cr += L.col[0] * sK * att[0];
        cg += L.col[1] * sK * att[1];
        cb += L.col[2] * sK * att[2];
      }
    }
  }

  // Fake-Kaustiken: helle Lichtflecken unter Glasobjekten
  if (obj.caust) {
    var ca2 = obj.caust;
    for (var ci = 0; ci < ca2.length; ci++) {
      var C = ca2[ci];
      var cdx = px - C.x, cdz = pz - C.z;
      var cd2 = (cdx * cdx + cdz * cdz) / (C.r * C.r);
      if (cd2 < 5) {
        var cg2 = Math.exp(-cd2 * 1.3) * C.k;
        cr += base[0] * C.col[0] * cg2;
        cg += base[1] * C.col[1] * cg2;
        cb += base[2] * C.col[2] * cg2;
      }
    }
  }

  if (depth < MAX_DEPTH) {
    var refx = dx - 2 * nd * nx, refy = dy - 2 * nd * ny, refz = dz - 2 * nd * nz;

    if (mat.transparency > 0) {
      var cosi = -nd;
      var f0 = (1 - mat.ior) / (1 + mat.ior); f0 *= f0;
      var F = f0 + (1 - f0) * Math.pow(1 - cosi, 5);
      var eta = inside ? mat.ior : 1 / mat.ior;
      var kk = 1 - eta * eta * (1 - cosi * cosi);
      if (kk < 0) F = 1;
      if (F * weight > 0.02) {
        var rc = trace(scene, px + nx * 3e-4, py + ny * 3e-4, pz + nz * 3e-4, refx, refy, refz, depth + 1, weight * F);
        cr += rc[0] * F; cg += rc[1] * F; cb += rc[2] * F;
      }
      if (kk >= 0) {
        var tw = (1 - F) * mat.transparency;
        if (tw * weight > 0.02) {
          var q = eta * cosi - Math.sqrt(kk);
          var tdx = dx * eta + nx * q, tdy = dy * eta + ny * q, tdz = dz * eta + nz * q;
          var tl = 1 / Math.sqrt(tdx * tdx + tdy * tdy + tdz * tdz);
          tdx *= tl; tdy *= tl; tdz *= tl;
          var tc = trace(scene, px - nx * 3e-4, py - ny * 3e-4, pz - nz * 3e-4, tdx, tdy, tdz, depth + 1, weight * tw);
          cr += tc[0] * tw * mat.tint[0];
          cg += tc[1] * tw * mat.tint[1];
          cb += tc[2] * tw * mat.tint[2];
        }
      }
    } else if (mat.reflect > 0 && mat.reflect * weight > 0.02) {
      var rc2 = trace(scene, px + nx * 3e-4, py + ny * 3e-4, pz + nz * 3e-4, refx, refy, refz, depth + 1, weight * mat.reflect);
      cr += rc2[0] * mat.reflect * mat.reflTint[0];
      cg += rc2[1] * mat.reflect * mat.reflTint[1];
      cb += rc2[2] * mat.reflect * mat.reflTint[2];
    }
  }

  if (scene.fog) {
    var f = 1 - Math.exp(-scene.fog.density * t);
    var fc = scene.fog.color;
    cr += (fc[0] - cr) * f; cg += (fc[1] - cg) * f; cb += (fc[2] - cb) * f;
  }
  return [cr, cg, cb];
}

// ---------------------------------------------------------------- Palette / Himmel / Boden
function makePalette(R, force) {
  var h0 = R.next();
  var scheme = wpick(R, [['mono', 2], ['comp', 3], ['triad', 2], ['primary', 2.2],
                         ['pastel', 1], ['neon', 1.5], ['gray', 0.8]]);
  if (force) scheme = force;
  var hues, satR, litR;
  switch (scheme) {
    case 'mono': hues = [h0]; satR = [0.7, 1]; litR = [0.32, 0.6]; break;
    case 'comp': hues = [h0, h0 + 0.5 + R.range(-0.06, 0.06)]; satR = [0.65, 1]; litR = [0.38, 0.58]; break;
    case 'triad': hues = [h0, h0 + 1 / 3, h0 + 2 / 3]; satR = [0.65, 0.95]; litR = [0.38, 0.58]; break;
    case 'primary': { // reine POV-Ray-Primärfarben
      var prims = [0, 1 / 6, 1 / 3, 1 / 2, 2 / 3, 5 / 6];
      var start = R.int(0, 5), cnt = R.int(2, 3);
      hues = [];
      for (var pi2 = 0; pi2 < cnt; pi2++) hues.push(prims[(start + pi2 * 2) % 6]);
      satR = [0.92, 1]; litR = [0.42, 0.55];
      break;
    }
    case 'pastel': hues = [h0, h0 + R.range(0.1, 0.4), h0 + R.range(0.5, 0.8)]; satR = [0.25, 0.5]; litR = [0.6, 0.8]; break;
    case 'neon': hues = [h0, h0 + R.range(0.25, 0.5)]; satR = [0.9, 1]; litR = [0.5, 0.62]; break;
    default: hues = [h0]; satR = [0.6, 0.9]; litR = [0.4, 0.6];
  }
  return {
    scheme: scheme, h0: h0, hues: hues,
    obj: function () {
      if (scheme === 'gray' && R.chance(0.55)) {
        var g = R.range(0.2, 0.9); return [g, g, g];
      }
      return hsl(R.pick(hues) + R.range(-0.03, 0.03), R.range(satR[0], satR[1]), R.range(litR[0], litR[1]));
    }
  };
}

function makePlanet(R, pal, big) {
  var az = R.next() * Math.PI * 2, el = R.range(0.15, 0.6);
  var px = Math.cos(el) * Math.sin(az), py = Math.sin(el), pz = Math.cos(el) * Math.cos(az);
  var rad = big ? R.range(0.06, 0.17) : R.range(0.03, 0.09);
  var ux = pz, uy = 0, uz = -px; // ⊥ zu dir, horizontal
  var ul = Math.sqrt(ux * ux + uz * uz) + 1e-9; ux /= ul; uz /= ul;
  var vx = py * uz - pz * uy, vy = pz * ux - px * uz, vz = px * uy - py * ux;
  var laz = R.next() * Math.PI * 2, lel = R.range(-0.3, 0.5);
  var P = {
    x: px, y: py, z: pz, rad: rad, sinR: Math.sin(rad), cosCull: Math.cos(rad * 2.6),
    ux: ux, uy: uy, uz: uz, vx: vx, vy: vy, vz: vz,
    lx: Math.cos(lel) * Math.sin(laz), ly: Math.sin(lel), lz: Math.cos(lel) * Math.cos(laz),
    bands: R.chance(0.5), bandF: R.range(4, 9), off: R.range(0, 100),
    c1: R.chance(0.5) ? hsl(R.pick(pal.hues), R.range(0.3, 0.7), R.range(0.5, 0.7)) : hsl(R.next(), R.range(0.3, 0.6), R.range(0.5, 0.75)),
    c2: hsl(R.next(), R.range(0.3, 0.7), R.range(0.3, 0.55)),
    ring: null
  };
  if (R.chance(0.35)) {
    P.ring = { r1: R.range(1.35, 1.6), r2: R.range(1.9, 2.4), tilt: R.range(0.22, 0.45),
      col: mix3(P.c1, [0.85, 0.82, 0.75], 0.6) };
  }
  return P;
}

function makeSky(R, pal, hint) {
  hint = hint || {};
  var type = wpick(R, [['gradient', 3], ['clouds', 2.5], ['sunset', 2], ['night', 1.6],
                       ['bands', 1], ['weird', 1]]);
  if (pal.scheme === 'neon' && R.chance(0.6)) type = R.pick(['night', 'bands']);
  if (hint.sunset && R.chance(0.55)) type = 'sunset';
  if (hint.alien) type = wpick(R, [['weird', 3], ['sunset', 2], ['night', 2], ['bands', 1]]);
  var sky = { type: type === 'clouds' ? 'gradient' : type, clouds: false, stars: false, sun: null,
              planets: null, mountains: null, mtMax: 0 };
  var az = R.next() * Math.PI * 2, el;
  switch (type) {
    case 'gradient':
    case 'clouds': {
      var hb = R.chance(0.75) ? R.range(0.55, 0.66) : R.next();
      sky.zen = hsl(hb, R.range(0.65, 0.95), R.range(0.28, 0.45));
      sky.hor = mix3(hsl(hb + R.range(-0.05, 0.05), R.range(0.3, 0.6), R.range(0.65, 0.8)), [1, 1, 1], R.range(0, 0.25));
      if (type === 'clouds') {
        sky.clouds = true;
        sky.cScale = R.range(0.15, 0.45); sky.cOff = R.range(0, 100);
        sky.cThresh = R.range(0.35, 0.55);
        sky.cloudCol = [1, 0.99, 0.97];
      }
      if (R.chance(0.55)) el = R.range(0.25, 1.0);
      break;
    }
    case 'sunset': {
      var hh = R.range(0.01, 0.09);
      sky.hor = hsl(hh, R.range(0.8, 1), R.range(0.5, 0.62));
      sky.zen = hsl(R.range(0.65, 0.8), R.range(0.4, 0.7), R.range(0.15, 0.3));
      el = R.range(0.03, 0.18);
      break;
    }
    case 'night': {
      sky.zen = [0.01, 0.01, 0.04];
      sky.hor = R.chance(0.5) ? hsl(R.pick(pal.hues), 0.6, 0.16) : [0.04, 0.05, 0.1];
      sky.stars = true;
      break;
    }
    case 'bands': {
      sky.bandN = R.int(4, 9);
      sky.hor = hsl(R.pick(pal.hues), 0.85, 0.55);
      sky.zen = hsl(R.pick(pal.hues) + 0.4, 0.8, 0.2);
      break;
    }
    default: { // weird
      sky.hor = hsl(R.next(), R.range(0.5, 1), R.range(0.4, 0.7));
      sky.zen = hsl(R.next(), R.range(0.5, 1), R.range(0.15, 0.5));
      var zl = 0.2126 * sky.zen[0] + 0.7152 * sky.zen[1] + 0.0722 * sky.zen[2];
      if (zl < 0.12 && R.chance(0.5)) sky.stars = true;
    }
  }
  if (el !== undefined) {
    var sx = Math.cos(el) * Math.sin(az), sy = Math.sin(el), sz = Math.cos(el) * Math.cos(az);
    var sunCol = type === 'sunset' ? [1, 0.55, 0.25] : [1, 0.95, 0.8];
    sky.sun = { x: sx, y: sy, z: sz, col: sunCol,
      glowPow: type === 'sunset' ? R.range(30, 90) : R.range(150, 500),
      glowInt: type === 'sunset' ? R.range(0.5, 1) : R.range(0.25, 0.6),
      discCos: Math.cos(type === 'sunset' ? R.range(0.02, 0.05) : R.range(0.008, 0.018)) };
  }
  // Planeten (nur bei dunklen/exotischen Himmeln)
  var planetOk = hint.alien || type === 'night' || type === 'weird' || type === 'bands' || type === 'sunset';
  if (planetOk) {
    var pCount = hint.alien ? R.int(1, 3) : (R.chance(0.18) ? 1 : 0);
    if (pCount > 0) {
      sky.planets = [];
      for (var pi = 0; pi < pCount; pi++) sky.planets.push(makePlanet(R, pal, hint.alien));
    }
  }
  // Silhouetten-Berge am Horizont
  var mtOk = type !== 'bands';
  if (mtOk && R.chance(hint.alien ? 0.75 : 0.3)) {
    sky.mountains = [];
    var layers = R.int(1, 3);
    var darkBase = type === 'night' ? 0.05 : 0.35;
    for (var mi = 0; mi < layers; mi++) {
      var nearF = layers === 1 ? 1 : mi / (layers - 1); // 0 = fern, 1 = nah
      var h = R.range(0.05, 0.2) * (0.7 + nearF * 0.5);
      var mcol = scale3(mix3(sky.hor, sky.zen, 0.6), darkBase * (1 - nearF * 0.55));
      if (hint.alien && R.chance(0.4)) mcol = scale3(hsl(R.pick(pal.hues), 0.5, 0.25), 1 - nearF * 0.5);
      sky.mountains.push({ s: R.range(1.5, 4.5), off: R.range(0, 100), h: h,
        col: mcol, haze: (1 - nearF) * 0.6 });
      if (h * 0.72 > sky.mtMax) sky.mtMax = h * 0.72;
    }
  }
  return sky;
}

function makeFloorMat(Rl, Rp, pal, sky, hint) {
  var kind = wpick(Rl, [['bw', 2.6], ['colChecker', 3], ['marble', 1.1], ['solid', 1.2],
                        ['grid', (sky.stars || pal.scheme === 'neon') ? 2 : 0.4], ['stripes', 0.8],
                        ['wood', hint === 'room' ? 2.5 : 0.6], ['bozo', hint === 'alien' ? 3 : 0.3]]);
  var tex, reflect = Math.pow(Rl.next(), 1.6) * 0.45;
  var sc = Rl.range(0.8, 2.2);
  switch (kind) {
    case 'bw': {
      var d = Rp.range(0.02, 0.12), b = Rp.range(0.75, 0.95);
      tex = { type: 'checker', c1: [d, d, d], c2: [b, b, b], scale: sc };
      break;
    }
    case 'colChecker': {
      var ca = hsl(Rp.pick(pal.hues), Rp.range(0.6, 0.95), Rp.range(0.35, 0.5));
      var cb2 = Rp.chance(0.5) ? [0.92, 0.9, 0.86] : hsl(Rp.pick(pal.hues) + Rp.range(-0.08, 0.08), Rp.range(0.5, 0.9), Rp.range(0.12, 0.25));
      tex = { type: 'checker', c1: ca, c2: cb2, scale: sc };
      break;
    }
    case 'marble': {
      tex = { type: 'marble', c1: [0.85, 0.84, 0.8], c2: Rp.chance(0.5) ? [0.2, 0.2, 0.25] : scale3(pal.obj(), 0.45),
        ax: 1, az: Rp.range(-0.6, 0.6), freq: Rp.range(0.5, 1.2), turb: Rp.range(3, 8), off: Rp.range(0, 100) };
      reflect = Rl.range(0.1, 0.4);
      break;
    }
    case 'grid': {
      tex = { type: 'grid', c1: [0.02, 0.02, 0.05], c2: hsl(Rp.pick(pal.hues), 1, 0.6), scale: Rl.range(1, 2), lw: 0.03 };
      reflect = Rl.range(0.15, 0.45);
      break;
    }
    case 'stripes': {
      tex = { type: 'stripes', c1: scale3(pal.obj(), 0.8), c2: scale3(pal.obj(), 0.4),
        ax: Rl.chance(0.5) ? 1 : 0.7, az: Rl.chance(0.5) ? 0 : 0.7, scale: Rl.range(0.8, 2) };
      break;
    }
    case 'wood': {
      var w1 = hsl(Rp.range(0.06, 0.1), Rp.range(0.4, 0.6), Rp.range(0.4, 0.55));
      tex = { type: 'wood', c1: w1, c2: scale3(w1, 0.5), ax: 1, az: Rp.range(-0.15, 0.15),
        freq: Rp.range(3, 7), turb: Rp.range(1.5, 3.5), off: Rp.range(0, 100) };
      reflect = Rl.range(0.05, 0.25);
      break;
    }
    case 'bozo': {
      tex = { type: 'bozo', c1: scale3(pal.obj(), 0.7), c2: scale3(pal.obj(), 0.45), c3: scale3(pal.obj(), 0.9),
        freq: Rp.range(0.4, 1.2), t1: 0.44, t2: 0.54, off: Rp.range(0, 100) };
      break;
    }
    default:
      tex = { type: 'solid', c1: scale3(pal.obj(), 0.8) };
      reflect = Rl.range(0.15, 0.5);
  }
  if (tex.type !== 'solid') {
    tex.fade = Rl.range(25, 60);
    if (tex.type === 'bozo') tex.avg = mix3(texAvg(tex.c1, tex.c2), tex.c3, 0.33);
    else tex.avg = texAvg(tex.c1, tex.c2);
  }
  return { tex: tex, diffuse: 0.9, ambK: 1, specular: 0.3, shine: 40,
    reflect: reflect, reflTint: [1, 1, 1], transparency: 0, ior: 1.5, tint: [1, 1, 1] };
}

// ---------------------------------------------------------------- Szenen-Generator
function placeOnFloor(R, placed, rMin, rMax, areaR) {
  for (var tries = 0; tries < 60; tries++) {
    var r = R.range(rMin, rMax);
    var a = R.next() * Math.PI * 2;
    var d = Math.sqrt(R.next()) * areaR;
    var x = Math.sin(a) * d, z = Math.cos(a) * d;
    var ok = true;
    for (var i = 0; i < placed.length; i++) {
      var p = placed[i];
      var ddx = x - p.x, ddz = z - p.z;
      if (ddx * ddx + ddz * ddz < (r + p.r + 0.15) * (r + p.r + 0.15)) { ok = false; break; }
    }
    if (ok) { var res = { x: x, z: z, r: r }; placed.push(res); return res; }
  }
  return null;
}

function randObjOnFloor(Rl, Rp, pal, spot, allowTypes) {
  var mat = randMaterial(Rl, Rp, pal);
  var type = Rl.pick(allowTypes);
  switch (type) {
    case 'box': {
      var hy = Rl.range(0.35, spot.r * 1.4 + 0.3);
      return mkBox(spot.x, hy, spot.z, spot.r * Rl.range(0.7, 1), hy, spot.r * Rl.range(0.7, 1), Rl.next() * Math.PI, mat);
    }
    case 'cyl': {
      var h = Rl.range(0.7, 2.8);
      return mkCyl(spot.x, spot.z, 0, h, spot.r * Rl.range(0.6, 0.95), mat);
    }
    case 'cone': {
      var ch = Rl.range(1, 2.6);
      var r0 = spot.r * Rl.range(0.7, 0.95);
      return mkCone(spot.x, spot.z, 0, ch, r0, r0 * Rl.range(0.05, 0.4), mat);
    }
    case 'torus': {
      if (Rl.chance(0.5)) { // liegender Donut
        var mr = spot.r * Rl.range(0.28, 0.42);
        return mkTorus(spot.x, mr, spot.z, spot.r * Rl.range(0.65, 0.85), mr, 0, 0, mat);
      }
      var mr2 = spot.r * Rl.range(0.16, 0.28); // stehender Ring
      var RR = spot.r * Rl.range(0.6, 0.85);
      return mkTorus(spot.x, RR + mr2, spot.z, RR, mr2, Rl.next() * Math.PI, Math.PI / 2, mat);
    }
    default:
      return mkSphere(spot.x, spot.r, spot.z, spot.r, mat);
  }
}

function generateScene(seeds, opts) {

      break;
    }
    case 'csg': {
      var n7 = Rl.int(2, 4);
      for (i = 0; i < n7; i++) {
        spot = placeOnFloor(Rl, placed, 0.7, 1.3, 5);
        if (!spot) break;
        var ck = wpick(Rl, [['dice', 3], ['bite', 2], ['bowl', 1.5], ['tube', 1.5]]);
        mat = randMaterial(Rl, Rp, pal);
        if (ck === 'dice') scene.objects.push(mkDice(spot.x, spot.z, spot.r * 0.75, Rl.next() * Math.PI, mat));
        else if (ck === 'bite') scene.objects.push(mkBiteCube(Rl, spot.x, spot.z, spot.r * 0.7, mat));
        else if (ck === 'bowl') scene.objects.push(mkBowl(spot.x, spot.z, spot.r, mat));
        else scene.objects.push(mkTube(spot.x, spot.z, spot.r * 0.8, Rl.range(0.6, 1.6), Rl.range(0.55, 0.75), mat));
      }
      if (Rl.chance(0.5)) {
        spot = placeOnFloor(Rl, placed, 0.5, 0.9, 5);
        if (spot) scene.objects.push(mkSphere(spot.x, spot.r, spot.z, spot.r, matGlass(Rp, pal)));
      }
      maxH = 3;
      break;
    }
    case 'menger': {
      var mS = Rl.range(1.4, 2.2);
      var mLvl = Rl.chance(0.55) ? 2 : 1;
      var mk2 = wpick(Rl, [['chrome', 2], ['glossy', 2], ['marble', 1.5], ['metal', 1]]);
      var mMat = mk2 === 'chrome' ? matChrome(Rp) : mk2 === 'glossy' ? matGlossy(Rp, pal)
               : mk2 === 'marble' ? matMarbleTex(Rp, pal) : matMetalTint(Rp);
      var mRot = Rl.next() * Math.PI;
      var mCos = Math.cos(mRot), mSin = Math.sin(mRot);
      var addCube = function (ccx, ccy, ccz, h, depth) {
        if (depth === 0) {
          scene.objects.push(mkBox(mCos * ccx + mSin * ccz, ccy, -mSin * ccx + mCos * ccz, h, h, h, mRot, mMat));
          return;
        }
        var step = h * 2 / 3;
        for (var ddx = -1; ddx <= 1; ddx++)
          for (var ddy = -1; ddy <= 1; ddy++)
            for (var ddz = -1; ddz <= 1; ddz++) {
              if (Math.abs(ddx) + Math.abs(ddy) + Math.abs(ddz) < 2) continue;
              addCube(ccx + ddx * step, ccy + ddy * step, ccz + ddz * step, h / 3, depth - 1);
            }
      };
      addCube(0, mS, 0, mS, mLvl);
      maxH = mS * 2;
      boundR = mS * 1.9;
      break;
    }
    case 'forest': {
      var fN = Rl.int(35, 90);
      var fKind = wpick(Rl, [['cyl', 3], ['cone', 1.5]]);
      var fk2 = wpick(Rl, [['marble', 2], ['wood', 1.5], ['glossy', 2], ['chrome', 1]]);
      var fMat4 = fk2 === 'marble' ? matMarbleTex(Rp, pal) : fk2 === 'wood' ? matWood(Rp, pal)
                : fk2 === 'glossy' ? matGlossy(Rp, pal) : matChrome(Rp);
      var fSame = Rl.chance(0.7);
      for (i = 0; i < fN; i++) {
        spot = placeOnFloor(Rl, placed, 0.16, 0.4, 13);
        if (!spot) continue;
        var fh = Rl.range(2.5, 6);
        var fm = fSame ? fMat4 : randMaterial(Rl, Rp, pal);
        if (fKind === 'cone') scene.objects.push(mkCone(spot.x, spot.z, 0, fh, spot.r, 0.03, fm));
        else scene.objects.push(mkCyl(spot.x, spot.z, 0, fh, spot.r, fm));
      }
      if (Rl.chance(0.5)) {
        spot = placeOnFloor(Rl, placed, 1.1, 1.6, 6);
        if (spot) scene.objects.push(mkSphere(spot.x, spot.r, spot.z, spot.r, Rl.chance(0.5) ? matChrome(Rp) : matGlass(Rp, pal)));
      }
      maxH = 6;
      boundR = 9;
      break;
    }
    default: { // chaos
      hasFloor = !Rl.chance(0.15);
      var n6 = Rl.int(5, 14);
      for (i = 0; i < n6; i++) {
        var cr2 = Rl.range(0.3, 1.4);
        var cx3 = Rl.range(-6, 6), cz3 = Rl.range(-6, 6);
        var cy3 = Rl.chance(0.6) ? cr2 : Rl.range(cr2, 4.5);
        mat = randMaterial(Rl, Rp, pal);
        var ct = Rl.pick(['sphere', 'sphere', 'box', 'cyl', 'torus', 'cone']);
        if (ct === 'box') scene.objects.push(mkBox(cx3, cy3, cz3, cr2, cr2 * Rl.range(0.5, 1.6), cr2, Rl.next() * Math.PI, mat));
        else if (ct === 'cyl') scene.objects.push(mkCyl(cx3, cz3, 0, Rl.range(0.6, 3.5), cr2 * 0.7, mat));
        else if (ct === 'cone') scene.objects.push(mkCone(cx3, cz3, 0, Rl.range(1, 3), cr2 * 0.8, cr2 * Rl.range(0.05, 0.3), mat));
        else if (ct === 'torus') scene.objects.push(mkTorus(cx3, cy3, cz3, cr2, cr2 * 0.35, Rl.next() * Math.PI, Rl.range(0, Math.PI), mat));
        else scene.objects.push(mkSphere(cx3, cy3, cz3, cr2, mat));
      }
      maxH = 4.5;
    }
  }

  // Kleine Streukugeln als Deko
  if (hasFloor && arch !== 'columns' && Rl.chance(0.35)) {
    var pebN = Rl.int(4, 10);
    var pebSame = Rl.chance(0.5);
    var pebMat = pebSame ? randMaterial(Rl, Rp, pal) : null;
    for (i = 0; i < pebN; i++) {
      spot = placeOnFloor(Rl, placed, 0.1, 0.28, 7);
      if (!spot) break;
      scene.objects.push(mkSphere(spot.x, spot.r, spot.z, spot.r, pebMat || randMaterial(Rl, Rp, pal)));
    }
  }

  // Boden
  if (hasFloor) {
    if (!floorMat) floorMat = makeFloorMat(Rl, Rp, pal, sky, arch);
    var floor = mkPlane(0, 0, 0, 0, 1, 0, floorMat);
    if (floorMat.rippleDef) floor.ripple = floorMat.rippleDef;
    scene.objects.push(floor);
  }

  // Lichter — Hauptlicht folgt der Sonne, falls vorhanden
  var sun = sky.sun;
  var mainCol = night ? mix3([1, 1, 1], hsl(Rs.next(), 0.5, 0.7), 0.4)
              : sky.type === 'sunset' ? [1, 0.82, 0.62]
              : mix3([1, 1, 1], hsl(pal.h0, 0.3, 0.8), 0.15);
  var mLx, mLy, mLz;
  if (sun) { mLx = sun.x * 30; mLy = Math.max(6, sun.y * 30); mLz = sun.z * 30; }
  else {
    var laz = Rs.next() * Math.PI * 2, lel = Rs.range(0.5, 1.2);
    mLx = Math.cos(lel) * Math.sin(laz) * 25; mLy = Math.sin(lel) * 25; mLz = Math.cos(lel) * Math.cos(laz) * 25;
  }
  if (arch === 'room') {
    var rd2 = roomD - 2;
    mLx = Math.max(-rd2, Math.min(rd2, mLx * 0.2));
    mLz = Math.max(-rd2, Math.min(rd2, mLz * 0.2));
    mLy = Rs.range(4, 6.5);
  }
  scene.lights.push({ x: mLx, y: mLy, z: mLz, col: mainCol, rad: Rs.range(0.9, 2.2),
    intensity: night ? Rs.range(0.6, 0.9) : Rs.range(0.95, 1.35) });
  var fillN = night ? Rs.int(1, 2) : wpick(Rs, [[0, 2], [1, 2], [2, 1]]);
  for (i = 0; i < fillN; i++) {
    var faz = Rs.next() * Math.PI * 2;
    var fCol = hsl(Rs.pick(pal.hues) + Rs.range(-0.05, 0.05), Rs.range(0.6, 1), Rs.range(0.55, 0.7));
    scene.lights.push({ x: Math.sin(faz) * Rs.range(6, 15), y: Rs.range(2, 10), z: Math.cos(faz) * Rs.range(6, 15),
      col: fCol, rad: Rs.range(0.8, 1.8), intensity: night ? Rs.range(0.5, 0.9) : Rs.range(0.25, 0.55) });
  }

  // Fake-Kaustiken unter Glaskugeln
  if (hasFloor) {
    var caust = [];
    var L0 = scene.lights[0];
    for (i = 0; i < scene.objects.length; i++) {
      o = scene.objects[i];
      if (o.type !== 'sphere' || o.mat.transparency < 0.7) continue;
      var cdx2 = o.cx - L0.x, cdy2 = o.cy - L0.y, cdz2 = o.cz - L0.z;
      var cdl = Math.sqrt(cdx2 * cdx2 + cdy2 * cdy2 + cdz2 * cdz2);
      cdx2 /= cdl; cdy2 /= cdl; cdz2 /= cdl;
      if (cdy2 > -0.05) continue;
      var ct2 = -o.cy / cdy2;
      caust.push({ x: o.cx + cdx2 * ct2 * 1.03, z: o.cz + cdz2 * ct2 * 1.03, r: o.r * 0.42,
        col: mix3(L0.col, o.mat.tint, 0.5), k: Rs.range(0.55, 1.1) * L0.intensity });
    }
    if (caust.length && floor) floor.caust = caust;
  }

  // Nebel
  var fogP = arch === 'columns' ? 0.45 : arch === 'water' ? 0.45 : arch === 'alien' ? 0.5
           : arch === 'forest' ? 0.75 : night ? 0.18 : 0.22;
  if (Rs.chance(fogP)) {
    var halfD = Rs.range(45, 110);
    scene.fog = { color: mix3(sky.hor, [1, 1, 1], night ? 0 : 0.08), density: 0.693 / halfD };
    scene.info.fog = true;
  }

  // Lens Flare (nur wenn Sonne existiert; Sichtbarkeit prüft das UI)
  if (sun && Rs.chance(0.5)) {
    scene.flare = { hue: Rs.next(), strength: Rs.range(0.5, 1) };
  }

  // Kamera
  var cam;
  if (aisle) {
    cam = { ex: Rc.range(-1.6, 1.6), ey: Rc.range(1.2, 3.4), ez: Rc.range(3.5, 6.5),
      lx: Rc.range(-0.5, 0.5), ly: Rc.range(0.8, 2), lz: -aisle.sp * aisle.rows * 0.5,
      fov: Rc.range(48, 66) };
  } else {
    var bR = boundR, bH = maxH;
    for (i = 0; i < scene.objects.length; i++) {
      o = scene.objects[i];
      if (o.type === 'plane') continue;
      var od = Math.sqrt(o.cx * o.cx + o.cz * o.cz) + o.bound;
      if (od > bR) bR = od;
      var oh = (o.type === 'cyl' || o.type === 'cone') ? o.y1 : o.cy + o.bound;
      if (oh > bH) bH = oh;
    }
    var dist = Rc.range(bR * 1.1 + 2, bR * 1.7 + 3.5);
    if (roomD) dist = Math.min(dist, roomD - 1.5);
    var ang;
    if (camHint) ang = camHint.ang + Rc.range(-camHint.spread, camHint.spread);
    else ang = Rc.next() * Math.PI * 2;
    if (arch === 'room') ang = Rc.range(-0.6, 0.6) + Math.PI * 0.25;
    var ey = Rc.chance(0.15) ? Rc.range(bH * 1.1, bH * 1.8 + 4) : Rc.range(1.0, Math.max(2.6, bH * 0.85));
    cam = { ex: Math.sin(ang) * dist, ey: ey, ez: Math.cos(ang) * dist,
      lx: Rc.range(-0.8, 0.8), ly: Rc.range(0.4, Math.max(1, bH * 0.5)), lz: Rc.range(-0.8, 0.8),
      fov: Rc.range(42, 68) };
  }
  // Kamera darf nicht in einem Objekt stecken
  for (var iter = 0; iter < 8; iter++) {
    var stuck = false;
    for (i = 0; i < scene.objects.length; i++) {
      o = scene.objects[i];
      if (o.type === 'plane') { if (cam.ey < 0.3) cam.ey = 0.5; continue; }
      var dxs = cam.ex - o.cx, dys = cam.ey - o.cy, dzs = cam.ez - o.cz;
      if (dxs * dxs + dys * dys + dzs * dzs < (o.bound + 0.5) * (o.bound + 0.5)) { stuck = true; break; }
    }
    if (!stuck) break;
    cam.ex *= 1.18; cam.ez *= 1.18; cam.ey += 0.4;
  }
  scene.cam = cam;
  return scene;
}

// ---------------------------------------------------------------- Kamera-Basis / Projektion
function camBasis(cam, W, H) {
  var fx = cam.lx - cam.ex, fy = cam.ly - cam.ey, fz = cam.lz - cam.ez;
  var fl = Math.sqrt(fx * fx + fy * fy + fz * fz);
  fx /= fl; fy /= fl; fz /= fl;
  var upx = 0, upy = 1, upz = 0;
  if (fy > 0.98 || fy < -0.98) { upx = 0; upy = 0; upz = 1; }
  var rx = fy * upz - fz * upy, ry = fz * upx - fx * upz, rz = fx * upy - fy * upx;
  var rl = Math.sqrt(rx * rx + ry * ry + rz * rz);
  rx /= rl; ry /= rl; rz /= rl;
  var ux = ry * fz - rz * fy, uy = rz * fx - rx * fz, uz = rx * fy - ry * fx;
  return { fx: fx, fy: fy, fz: fz, rx: rx, ry: ry, rz: rz, ux: ux, uy: uy, uz: uz,
    tanF: Math.tan(cam.fov * Math.PI / 360), aspect: W / H };
}
// Sonnenposition im Bild (oder null, wenn hinter Kamera / außerhalb / verdeckt)
function projectSun(scene, W, H) {
  var sun = scene.sky.sun;
  if (!sun) return null;
  var cam = scene.cam;
  var b = camBasis(cam, W, H);
  var df = sun.x * b.fx + sun.y * b.fy + sun.z * b.fz;
  if (df < 0.05) return null;
  var u = (sun.x * b.rx + sun.y * b.ry + sun.z * b.rz) / df;
  var v = (sun.x * b.ux + sun.y * b.uy + sun.z * b.uz) / df;
  var x = (u / (b.tanF * b.aspect) + 1) * W / 2;
  var y = (1 - v / b.tanF) * H / 2;
  if (x < -W * 0.15 || x > W * 1.15 || y < -H * 0.15 || y > H * 1.15) return null;
  var hit = intersectScene(scene, cam.ex, cam.ey, cam.ez, sun.x, sun.y, sun.z);
  if (hit) return null;
  return { x: x, y: y };
}

// ---------------------------------------------------------------- Renderer
var OFF4 = [[0.125, 0.375], [0.625, 0.125], [0.375, 0.875], [0.875, 0.625]];
function createRenderer(scene, W, H, mode) {
  var cam = scene.cam;
  var b = camBasis(cam, W, H);
  var fx = b.fx, fy = b.fy, fz = b.fz, rx = b.rx, ry = b.ry, rz = b.rz, ux = b.ux, uy = b.uy, uz = b.uz;
  var tanF = b.tanF, aspect = b.aspect;
  var invG = 1 / 2.2;

  function sampleAt(x, y, sx, sy) {
    var u = (2 * (x + sx) / W - 1) * tanF * aspect;
    var v = (1 - 2 * (y + sy) / H) * tanF;
    var dx = fx + rx * u + ux * v;
    var dy = fy + ry * u + uy * v;
    var dz = fz + rz * u + uz * v;
    var dl = 1 / Math.sqrt(dx * dx + dy * dy + dz * dz);
    return trace(scene, cam.ex, cam.ey, cam.ez, dx * dl, dy * dl, dz * dl, 0, 1);
  }
  function gByte(c) { return Math.pow(c < 0 ? 0 : c > 1 ? 1 : c, invG) * 255; }

  // Modus: 0 = schnell, 1 = adaptiv, 2 = 4×AA, 3 = adaptiv + weiche Schatten
  var soft = mode === 3;
  var sampleMode = mode === 3 ? 1 : mode;

  // Rendert die Zeilen [y0, y1) in out (RGBA, Zeile 0 = y0)
  function renderBand(y0, y1, out) {
    SOFT_SHADOWS = soft;
    var mode = sampleMode;
    var bh = y1 - y0, x, y, j, s, c, idx;
    if (mode !== 1) {
      var offs = mode === 2 ? OFF4 : [[0.5, 0.5]];
      var invN = 1 / offs.length;
      idx = 0;
      for (y = y0; y < y1; y++) {
        for (x = 0; x < W; x++) {
          var cr = 0, cg = 0, cb = 0;
          for (s = 0; s < offs.length; s++) {
            c = sampleAt(x, y, offs[s][0], offs[s][1]);
            cr += c[0]; cg += c[1]; cb += c[2];
          }
          out[idx++] = gByte(cr * invN);
          out[idx++] = gByte(cg * invN);
          out[idx++] = gByte(cb * invN);
          out[idx++] = 255;
        }
      }
      return;
    }
    // Adaptiv: 1 Sample/Pixel, an Kanten 4 zusätzliche
    var W3 = W * 3;
    var fl = new Float32Array((bh + 2) * W3);
    var by = new Uint8ClampedArray((bh + 2) * W3);
    var o3 = 0;
    for (j = 0; j < bh + 2; j++) {
      var yy = y0 + j - 1;
      if (yy < 0) yy = 0; else if (yy >= H) yy = H - 1;
      for (x = 0; x < W; x++) {
        c = sampleAt(x, yy, 0.5, 0.5);
        fl[o3] = c[0]; by[o3] = gByte(c[0]); o3++;
        fl[o3] = c[1]; by[o3] = gByte(c[1]); o3++;
        fl[o3] = c[2]; by[o3] = gByte(c[2]); o3++;
      }
    }
    var THR = 24;
    for (j = 0; j < bh; j++) {
      var yb = y0 + j;
      var row = (j + 1) * W3;
      idx = j * W * 4;
      for (x = 0; x < W; x++) {
        var i3 = row + x * 3;
        var iL = x > 0 ? i3 - 3 : i3, iR = x < W - 1 ? i3 + 3 : i3;
        var iU = i3 - W3, iD = i3 + W3;
        var d = 0, dd, ch;
        for (ch = 0; ch < 3; ch++) {
          var v0 = by[i3 + ch];
          dd = v0 - by[iL + ch]; if (dd < 0) dd = -dd; if (dd > d) d = dd;
          dd = v0 - by[iR + ch]; if (dd < 0) dd = -dd; if (dd > d) d = dd;
          dd = v0 - by[iU + ch]; if (dd < 0) dd = -dd; if (dd > d) d = dd;
          dd = v0 - by[iD + ch]; if (dd < 0) dd = -dd; if (dd > d) d = dd;
        }
        if (d > THR) {
          var ar = fl[i3], ag = fl[i3 + 1], ab = fl[i3 + 2];
          for (s = 0; s < 4; s++) {
            c = sampleAt(x, yb, OFF4[s][0], OFF4[s][1]);
            ar += c[0]; ag += c[1]; ab += c[2];
          }
          out[idx++] = gByte(ar * 0.2);
          out[idx++] = gByte(ag * 0.2);
          out[idx++] = gByte(ab * 0.2);
        } else {
          out[idx++] = by[i3];
          out[idx++] = by[i3 + 1];
          out[idx++] = by[i3 + 2];
        }
        out[idx++] = 255;
      }
    }
  }
  return { renderBand: renderBand };
}

// ---------------------------------------------------------------- Lens Flare
function applyLensFlare(data, W, H, sx, sy, flare) {
  var st = flare.strength;
  var cx = W / 2, cy = H / 2;
  var i, x, y, dx, dy, d2, a;
  function addDisc(px, py, rad, col, alpha) {
    var r2 = rad * rad;
    var x0 = Math.max(0, Math.floor(px - rad)), x1 = Math.min(W - 1, Math.ceil(px + rad));
    var y0 = Math.max(0, Math.floor(py - rad)), y1 = Math.min(H - 1, Math.ceil(py + rad));
    for (y = y0; y <= y1; y++) {
      dy = y - py;
      for (x = x0; x <= x1; x++) {
        dx = x - px;
        d2 = dx * dx + dy * dy;
        if (d2 < r2) {
          a = 1 - d2 / r2; a = a * a * alpha;
          i = (y * W + x) * 4;
          data[i] += col[0] * a * 255;
          data[i + 1] += col[1] * a * 255;
          data[i + 2] += col[2] * a * 255;
        }
      }
    }
  }
  function addRing(px, py, rad, wdt, col, alpha) {
    var rOut = rad + wdt * 3;
    var x0 = Math.max(0, Math.floor(px - rOut)), x1 = Math.min(W - 1, Math.ceil(px + rOut));
    var y0 = Math.max(0, Math.floor(py - rOut)), y1 = Math.min(H - 1, Math.ceil(py + rOut));
    for (y = y0; y <= y1; y++) {
      dy = y - py;
      for (x = x0; x <= x1; x++) {
        dx = x - px;
        var dd = Math.sqrt(dx * dx + dy * dy) - rad;
        if (dd > -wdt * 3 && dd < wdt * 3) {
          a = Math.exp(-(dd * dd) / (wdt * wdt)) * alpha;
          i = (y * W + x) * 4;
          data[i] += col[0] * a * 255;
          data[i + 1] += col[1] * a * 255;
          data[i + 2] += col[2] * a * 255;
        }
      }
    }
  }
  // Hauptglühen um die Sonne
  addDisc(sx, sy, W * 0.14 * st, [1, 0.93, 0.8], 0.55);
  addDisc(sx, sy, W * 0.045 * st, [1, 1, 0.95], 0.9);
  // Horizontaler Streak
  var streakW = W * 0.55 * st;
  var yS0 = Math.max(0, Math.floor(sy - 6)), yS1 = Math.min(H - 1, Math.ceil(sy + 6));
  for (y = yS0; y <= yS1; y++) {
    dy = (y - sy) / 2.2;
    var fy2 = Math.exp(-dy * dy);
    for (x = 0; x < W; x++) {
      var fx2 = 1 - Math.abs(x - sx) / streakW;
      if (fx2 <= 0) continue;
      a = fy2 * fx2 * fx2 * 0.55;
      i = (y * W + x) * 4;
      data[i] += 255 * a; data[i + 1] += 245 * a; data[i + 2] += 225 * a;
    }
  }
  // Ghost-Reihe entlang der Achse Sonne → Bildmitte
  var GT = [0.35, 0.55, 0.8, 1.15, 1.45, 1.75];
  var GR = [0.022, 0.038, 0.016, 0.05, 0.026, 0.042];
  for (var g = 0; g < GT.length; g++) {
    var gx = sx + (cx - sx) * 2 * GT[g];
    var gy = sy + (cy - sy) * 2 * GT[g];
    var gc = hsl(flare.hue + g * 0.11, 0.6, 0.55);
    addDisc(gx, gy, W * GR[g] * st, gc, 0.16);
  }
  addRing(sx + (cx - sx) * 2.4, sy + (cy - sy) * 2.4, W * 0.09 * st, 2.5, hsl(flare.hue + 0.5, 0.5, 0.6), 0.14);
}

// ---------------------------------------------------------------- Farb-Grading (Knallig-Look)
// Sättigungs-Boost + sanfte S-Kurve — kompensiert das „Auswaschen“ durch die
// Gamma-Korrektur und bringt den kontrastreichen CRT-Look der alten Renderer zurück.
function applyColorGrade(data, W, H, sat, con) {

        for (var i = 0; i < pool.workers.length; i++) {
          pool.workers[i].addEventListener('message', onMsg);
          pool.workers[i].addEventListener('error', onErr);
        }
        for (var j = 0; j < pool.workers.length; j++) dispatch(pool.workers[j]);
      } else {
        renderImageMain(seeds, opts, W, H, mode, cam, anim, onBand, isCancelled).then(resolve);
      }
    });
  }
  // Fallback: Hauptthread, häppchenweise
  function renderImageMain(seeds, opts, W, H, mode, cam, anim, onBand, isCancelled) {
    return new Promise(function (resolve) {
      var scene = RT90.generateScene(seeds, opts || {});
      if (cam) scene.cam = cam;
      RT90.applyAnim(scene, anim || null);
      RT90.STATS.rays = 0;
      var renderer = RT90.createRenderer(scene, W, H, mode);
      var img = new ImageData(W, H);
      var y = 0, bandIdx = 0, totalBands = Math.ceil(H / BAND_H);
      function chunk() {
        if (isCancelled()) { resolve(null); return; }
        var y1 = Math.min(H, y + BAND_H);
        var buf = new Uint8ClampedArray(W * (y1 - y) * 4);
        renderer.renderBand(y, y1, buf);
        img.data.set(buf, y * W * 4);
        bandIdx++;
        if (onBand) onBand(img, y, y1, bandIdx, totalBands, RT90.STATS.rays);
        y = y1;
        if (y < H) setTimeout(chunk, 0);
        else resolve(img);
      }
      setTimeout(chunk, 0);
    });
  }

  // ---------------- Zustand ----------------
  var renderToken = 0;
  var autoTimer = null;
  var busy = false; // Batch/Orbit läuft
  var current = { seeds: null, display: '', opts: {} };
  var lastMaster = null; // ImageData vor Dithering (inkl. Flare)
  var lastScene = null;

  function currentOpts() {
    var o = {};
    if (archSel.value) o.arch = archSel.value;
    if (palSel.value) o.pal = palSel.value;
    return o;
  }
  function optsToHash(opts) {
    return (opts.arch || opts.pal) ? ';' + (opts.arch || '') + ';' + (opts.pal || '') : '';
  }
  function newMaster() { return (Math.random() * 4294967296) >>> 0; }
  function cancelAuto() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }

  function setCanvasSize(W, H) {
    cv.width = W; cv.height = H;
    cv.classList.toggle('px2', W <= 400);
    cv.style.width = W <= 400 ? (W * 2) + 'px' : '';
  }

  // ---------------- Haupt-Rendering ----------------
  function startRender(parsed, optsOverride) {
    renderToken++;
    var token = renderToken;
    cancelAuto();
    busy = false;

    var opts = optsOverride !== undefined ? optsOverride : currentOpts();
    current = { seeds: parsed.seeds, display: parsed.display, opts: opts };
    seedInput.value = parsed.display;
    titleSeed.textContent = 'seed_' + parsed.display.substring(0, 40) + '.pov';
    try { history.replaceState(null, '', '#' + parsed.display + optsToHash(opts)); } catch (e) {}

    var wh = sizeSel.value.split('x');
    var W = parseInt(wh[0], 10), H = parseInt(wh[1], 10);
    setCanvasSize(W, H);
    var mode = parseInt(qualSel.value, 10);

    var scene = RT90.generateScene(parsed.seeds, opts);
    lastScene = scene;
    var t0 = performance.now();
    statusEl.textContent = 'Rendere …';

    renderImage(parsed.seeds, opts, W, H, mode, null, null, function (img, y0, y1, done, total, rays) {
      if (token !== renderToken) return;
      ctx.putImageData(img, 0, 0, 0, y0, W, y1 - y0);
      var el = (performance.now() - t0) / 1000;
      statusEl.textContent = 'Rendere … ' + Math.round(done / total * 100) + ' %' + (pool && !pool.failed ? ' (' + pool.workers.length + ' Threads)' : '');
      statsEl.textContent = el.toFixed(1) + ' s — ' + fmtInt(rays) + ' Strahlen';
    }, function () { return token !== renderToken; }).then(function (result) {
      if (token !== renderToken || !result) return;
      // Lens Flare einbrennen
      if (scene.flare) {
        var sp = RT90.projectSun(scene, W, H);
        if (sp) RT90.applyLensFlare(result.data, W, H, sp.x, sp.y, scene.flare);
      }
      lastMaster = result;
      presentImage();
      var el = (performance.now() - t0) / 1000;
      statusEl.textContent = 'Fertig. (' + scene.info.arch + ' / ' + scene.info.sky + ' / ' + scene.info.pal + (scene.info.fog ? ' / Nebel' : '') + ')';
      statsEl.textContent = el.toFixed(1) + ' s';
      pushHistory();
      if (autoChk.checked) {
        autoTimer = setTimeout(function () {
          if (token === renderToken && autoChk.checked && !busy) newImage();
        }, 3500);
      }
    });
  }
  // Zeigt lastMaster an, wendet ggf. Farb-Grading und 256-Farben-Dithering an
  function presentImage() {
    if (!lastMaster) return;
    var W = lastMaster.width, H = lastMaster.height;
    if (cv.width !== W || cv.height !== H) setCanvasSize(W, H);
    var work = lastMaster;
    if (vividChk.checked) {
      work = new ImageData(W, H);
      work.data.set(lastMaster.data);
      RT90.applyColorGrade(work.data, W, H, VIVID_SAT, VIVID_CON);
    }
    if (ditherChk.checked) {
      var q = RT90.quantizeDither(work.data, W, H);
      var di = new ImageData(W, H);
      di.data.set(q.rgba);
      ctx.putImageData(di, 0, 0);
    } else {
      ctx.putImageData(work, 0, 0);
    }
  }

  function newImage() {
    startRender(RT90.parseSeedInput(String(newMaster())));
  }
  // Variation: einen Teil-Seed neu würfeln
  function vary(idx) {
    if (!current.seeds) return;
    var seeds = current.seeds.slice();
    seeds[idx] = newMaster();
    startRender({ seeds: seeds, display: RT90.seedsToStr(seeds) }, current.opts);
  }

  // ---------------- Verlauf & Favoriten ----------------
  function loadList(key) {
    try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch (e) { return []; }
  }
  function saveList(key, list) {
    try { localStorage.setItem(key, JSON.stringify(list)); } catch (e) {}
  }
  function makeThumb() {
    var tw = 96, th = Math.max(24, Math.round(96 * cv.height / cv.width));
    var tc = document.createElement('canvas');
    tc.width = tw; tc.height = th;
    tc.getContext('2d').drawImage(cv, 0, 0, tw, th);
    return tc.toDataURL('image/jpeg', 0.72);
  }
  function entryKey(e) { return e.s + '|' + (e.a || '') + '|' + (e.p || ''); }
  function renderStrip(el, list, storageKey) {
    el.innerHTML = '';
    list.forEach(function (e, i) {
      var d = document.createElement('div');
      d.className = 'thumb';
      d.title = e.s + (e.a ? ' (' + e.a + ')' : '');
      var im = document.createElement('img');
      im.src = e.d;
      d.appendChild(im);
      if (storageKey === 'rt95_favs') {
        var x = document.createElement('span');
        x.className = 'del';
        x.textContent = '×';
        x.addEventListener('click', function (ev) {
          ev.stopPropagation();
          var l = loadList(storageKey);
          l.splice(i, 1);
          saveList(storageKey, l);
          refreshStrips();
        });
        d.appendChild(x);
      }
      d.addEventListener('click', function () {
        archSel.value = e.a || '';
        palSel.value = e.p || '';
        startRender(RT90.parseSeedInput(e.s), { arch: e.a || undefined, pal: e.p || undefined });
      });
      el.appendChild(d);
    });
  }
  function refreshStrips() {
    renderStrip(histStrip, loadList('rt95_hist'), 'rt95_hist');
    renderStrip(favStrip, loadList('rt95_favs'), 'rt95_favs');
  }
  function pushHistory() {
    var e = { s: RT90.seedsToStr(current.seeds), a: current.opts.arch || '', p: current.opts.pal || '', d: makeThumb() };
    var list = loadList('rt95_hist').filter(function (o) { return entryKey(o) !== entryKey(e); });
    list.unshift(e);
    if (list.length > 16) list.length = 16;
    saveList('rt95_hist', list);
    refreshStrips();
  }
  function addFavorite() {
    if (!current.seeds) return;
    var e = { s: RT90.seedsToStr(current.seeds), a: current.opts.arch || '', p: current.opts.pal || '', d: makeThumb() };
    var list = loadList('rt95_favs').filter(function (o) { return entryKey(o) !== entryKey(e); });
    list.unshift(e);
    if (list.length > 30) list.length = 30;
    saveList('rt95_favs', list);
    refreshStrips();
    statusEl.textContent = 'Als Favorit gespeichert.';
  }

  // ---------------- Batch-Export (ZIP) ----------------
  function runBatch() {
    if (busy) return;
    renderToken++;
    var token = renderToken;
    cancelAuto();
    busy = true;
    var COUNT = 8;
    var wh = sizeSel.value.split('x');
    var W = parseInt(wh[0], 10), H = parseInt(wh[1], 10);
    var mode = parseInt(qualSel.value, 10);
    var opts = currentOpts();
    var files = [];
    var idx = 0;
    setCanvasSize(W, H);

    function isCancelled() { return token !== renderToken; }
    function next() {
      if (isCancelled()) { busy = false; return; }
      if (idx >= COUNT) {
        var zip = RT90.zipStore(files);
        var blob = new Blob([zip], { type: 'application/zip' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'raytrace95_batch.zip';
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        statusEl.textContent = 'Batch fertig — ' + COUNT + ' Bilder im ZIP.';
        busy = false;
        return;
      }
      var master = newMaster();
      var parsed = RT90.parseSeedInput(String(master));
      var scene = RT90.generateScene(parsed.seeds, opts);
      statusEl.textContent = 'Batch: Bild ' + (idx + 1) + ' / ' + COUNT + ' …';
      renderImage(parsed.seeds, opts, W, H, mode, null, null, function (img, y0, y1) {
        if (!isCancelled()) ctx.putImageData(img, 0, 0, 0, y0, W, y1 - y0);
      }, isCancelled).then(function (img) {
        if (isCancelled() || !img) { busy = false; return; }
        if (scene.flare) {
          var sp = RT90.projectSun(scene, W, H);
          if (sp) RT90.applyLensFlare(img.data, W, H, sp.x, sp.y, scene.flare);
        }
        if (vividChk.checked) RT90.applyColorGrade(img.data, W, H, VIVID_SAT, VIVID_CON);
        var show = img;
        if (ditherChk.checked) {
          var q = RT90.quantizeDither(img.data, W, H);
          show = new ImageData(W, H);
          show.data.set(q.rgba);
        }
        ctx.putImageData(show, 0, 0);
        cv.toBlob(function (blob) {
          blob.arrayBuffer().then(function (ab) {
            files.push({ name: 'raytrace95_' + master + '.png', data: new Uint8Array(ab) });
            idx++;
            next();
          });
        }, 'image/png');
      });
    }
    next();
  }

  // ---------------- Animation (GIF / WebM) ----------------
  var animPath = document.getElementById('animPath');
  var animLen = document.getElementById('animLen');
  var animFmt = document.getElementById('animFmt');
  if (typeof VideoEncoder === 'undefined') {
    animFmt.querySelector('option[value=webm]').disabled = true;
  }
  function pathCam(path, cam0, t) {
    if (path === 'wellen' || path === 'sonne') {
      return { ex: cam0.ex, ey: cam0.ey, ez: cam0.ez, lx: cam0.lx, ly: cam0.ly, lz: cam0.lz, fov: cam0.fov };
    }
    var ang = t * Math.PI * 2;
    var ca = Math.cos(ang), sa = Math.sin(ang);
    var relX = cam0.ex - cam0.lx, relZ = cam0.ez - cam0.lz;
    var ex = cam0.lx + ca * relX + sa * relZ;
    var ez = cam0.lz - sa * relX + ca * relZ;
    var ey = cam0.ey;
    if (path === 'spirale') {
      var wob = 1 + 0.3 * Math.sin(ang);
      ex = cam0.lx + (ex - cam0.lx) * wob;
      ez = cam0.lz + (ez - cam0.lz) * wob;
      ey = Math.max(0.5, cam0.ey * (1 + 0.45 * Math.sin(ang)));
    }
    return { ex: ex, ey: ey, ez: ez, lx: cam0.lx, ly: cam0.ly, lz: cam0.lz, fov: cam0.fov };
  }
  function runAnim() {
    if (busy || !current.seeds) return;
    renderToken++;
    var token = renderToken;
    cancelAuto();
    busy = true;
    var path = animPath.value;
    var FRAMES = parseInt(animLen.value, 10);
    var fmt = animFmt.value;
    if (fmt === 'webm' && typeof VideoEncoder === 'undefined') fmt = 'gif';
    var wh = sizeSel.value.split('x');
    var fullW = parseInt(wh[0], 10), fullH = parseInt(wh[1], 10);
    var W = fmt === 'webm' ? 480 : 320;
    var H = Math.round(W * fullH / fullW / 2) * 2;
    var mode = parseInt(qualSel.value, 10);
    var opts = current.opts;
    var baseScene = RT90.generateScene(current.seeds, opts);
    var cam0 = baseScene.cam;
    var frames = [];
    var webmChunks = [];
    var encoder = null, encCanvas = null, encCtx = null;
    if (fmt === 'webm') {
      encCanvas = document.createElement('canvas');
      encCanvas.width = W; encCanvas.height = H;
      encCtx = encCanvas.getContext('2d');
      encoder = new VideoEncoder({
        output: function (chunk) {
          var buf = new Uint8Array(chunk.byteLength);
          chunk.copyTo(buf);
          webmChunks.push({ data: buf, keyframe: chunk.type === 'key', timeMs: Math.round(chunk.timestamp / 1000) });
        },
        error: function (e) { statusEl.textContent = 'WebM-Fehler: ' + e.message; }
      });
      encoder.configure({ codec: 'vp8', width: W, height: H, bitrate: 2500000, framerate: 25 });
    }
    var fi = 0;
    setCanvasSize(W, H);

    function isCancelled() { return token !== renderToken; }
    function abort() {
      if (encoder) { try { encoder.close(); } catch (e) {} }
      busy = false;
    }
    function finish() {
      if (fmt === 'gif') {
        statusEl.textContent = 'Kodiere GIF …';
        setTimeout(function () {
          var gif = RT90.gifEncode(W, H, frames, 8);
          var blob = new Blob([gif], { type: 'image/gif' });
          downloadBlob(blob, 'raytrace95_' + cleanName() + '_' + path + '.gif');
          statusEl.textContent = 'Animation fertig — ' + FRAMES + ' Frames, ' + Math.round(blob.size / 1024) + ' kB GIF.';
          busy = false;
        }, 20);
      } else {
        statusEl.textContent = 'Kodiere WebM …';
        encoder.flush().then(function () {
          var webm = RT90.webmMux(W, H, webmChunks, FRAMES * 40);
          var blob = new Blob([webm], { type: 'video/webm' });
          downloadBlob(blob, 'raytrace95_' + cleanName() + '_' + path + '.webm');
          statusEl.textContent = 'Animation fertig — ' + FRAMES + ' Frames, ' + Math.round(blob.size / 1024) + ' kB WebM.';
          try { encoder.close(); } catch (e) {}
          busy = false;
        }).catch(function (e) {
          statusEl.textContent = 'WebM-Fehler: ' + e.message;
          busy = false;
        });
      }
    }
    function next() {
      if (isCancelled()) { abort(); return; }
      if (fi >= FRAMES) { finish(); return; }
      var t = fi / FRAMES;
      var cam = pathCam(path, cam0, t);
      var anim = path === 'wellen' ? { type: 'waves', t: t } : path === 'sonne' ? { type: 'sun', t: t } : null;
      statusEl.textContent = 'Animation (' + path + '): Frame ' + (fi + 1) + ' / ' + FRAMES + ' …';
      renderImage(current.seeds, opts, W, H, mode, cam, anim, null, isCancelled).then(function (img) {
        if (isCancelled() || !img) { abort(); return; }
        if (baseScene.flare) {
          var sc2 = RT90.generateScene(current.seeds, opts);
          RT90.applyAnim(sc2, anim);
          sc2.cam = cam;
          var sp = RT90.projectSun(sc2, W, H);
          if (sp) RT90.applyLensFlare(img.data, W, H, sp.x, sp.y, baseScene.flare);
        }
        if (vividChk.checked) RT90.applyColorGrade(img.data, W, H, VIVID_SAT, VIVID_CON);
        var show = img;
        if (fmt === 'gif' || ditherChk.checked) {
          var q = RT90.quantizeDither(img.data, W, H);
          if (fmt === 'gif') frames.push({ indexed: q.indexed, palette: q.palette });
          show = new ImageData(W, H);
          show.data.set(q.rgba);
        }
        ctx.putImageData(show, 0, 0);
        if (fmt === 'webm') {
          encCtx.putImageData(show, 0, 0);
          var vf = new VideoFrame(encCanvas, { timestamp: fi * 40000, duration: 40000 });
          encoder.encode(vf, { keyFrame: fi % 25 === 0 });
          vf.close();
        }
        fi++;
        next();
      });
    }
    next();
  }

  // ---------------- Speichern ----------------
  function downloadBlob(blob, name) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
  }
  function cleanName() {
    return (current.display || 'bild').replace(/[^\w.\-]/g, '_');
  }
  function savePng() {
    cv.toBlob(function (blob) {
      downloadBlob(blob, 'raytrace95_' + cleanName() + '.png');
    }, 'image/png');
  }

  // ---------------- Favoriten-Export/-Import ----------------
  var favFile = document.getElementById('favFile');
  document.getElementById('favExp').addEventListener('click', function () {
    var list = loadList('rt95_favs');
    if (!list.length) { statusEl.textContent = 'Keine Favoriten vorhanden.'; return; }
    downloadBlob(new Blob([JSON.stringify(list, null, 1)], { type: 'application/json' }), 'raytrace95_favoriten.json');
  });
  document.getElementById('favImp').addEventListener('click', function () { favFile.click(); });
  favFile.addEventListener('change', function () {
    var f = favFile.files[0];
    if (!f) return;
    f.text().then(function (txt) {
      try {
        var arr = JSON.parse(txt);
        if (!Array.isArray(arr)) throw new Error('kein Array');
        var list = loadList('rt95_favs');
        var have = {};
        list.forEach(function (e) { have[entryKey(e)] = true; });
        var added = 0;
        arr.forEach(function (e) {
          if (e && typeof e.s === 'string' && typeof e.d === 'string' && !have[entryKey(e)]) {
            list.push({ s: e.s, a: e.a || '', p: e.p || '', d: e.d });
            have[entryKey(e)] = true;
            added++;
          }
        });
        if (list.length > 48) list.length = 48;
        saveList('rt95_favs', list);
        refreshStrips();
        statusEl.textContent = added + ' Favoriten importiert.';
      } catch (e) {
        statusEl.textContent = 'Import fehlgeschlagen: ' + e.message;
      }
      favFile.value = '';
    });
  });

  // ---------------- Events ----------------
  document.getElementById('btnNew').addEventListener('click', newImage);
  document.getElementById('btnSave').addEventListener('click', savePng);
  document.getElementById('btnFav').addEventListener('click', addFavorite);
  document.getElementById('btnSeed').addEventListener('click', function () {
    startRender(RT90.parseSeedInput(seedInput.value || '0'));
  });
  seedInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') startRender(RT90.parseSeedInput(seedInput.value || '0'));
  });
  document.getElementById('varColors').addEventListener('click', function () { vary(1); });
  document.getElementById('varCam').addEventListener('click', function () { vary(3); });
  document.getElementById('varSky').addEventListener('click', function () { vary(2); });
  document.getElementById('varLayout').addEventListener('click', function () { vary(0); });
  document.getElementById('btnBatch').addEventListener('click', runBatch);
  document.getElementById('btnAnim').addEventListener('click', runAnim);
  sizeSel.addEventListener('change', function () { if (current.seeds) startRender({ seeds: current.seeds, display: current.display }, current.opts); });
  qualSel.addEventListener('change', function () { if (current.seeds) startRender({ seeds: current.seeds, display: current.display }, current.opts); });
  ditherChk.addEventListener('change', function () { if (!busy) presentImage(); });
  vividChk.addEventListener('change', function () { if (!busy) presentImage(); });
  archSel.addEventListener('change', function () { newImage(); });
  palSel.addEventListener('change', function () { newImage(); });
  autoChk.addEventListener('change', function () {
    cancelAuto();
    if (autoChk.checked && !busy) newImage();
  });
  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && document.activeElement !== seedInput) {
      e.preventDefault();
      newImage();
    }
  });

  // ---------------- Start ----------------
  refreshStrips();
  var h = location.hash ? location.hash.slice(1) : '';
  if (h) {
    var segs = h.split(';');
    if (segs[1] !== undefined) archSel.value = segs[1] || '';
    if (segs[2] !== undefined) palSel.value = segs[2] || '';
    startRender(RT90.parseSeedInput(segs[0]));
  } else {
    newImage();
  }
})();
</script>
</body>
</html>
